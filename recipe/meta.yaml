{% set version = "0.5.12" %}
{% set sha = "4b133dad5b40c34261f0767a92acf9a5f62e1416343cb95a7c89d23a1865f39c" %}

package:
  name: usaddress
  version: {{ version }}

source:
  fn: usaddress-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/u/usaddress/usaddress-{{ version }}.tar.gz
  sha256: {{ sha }}

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python
    - pip
  run:
    - python
    - requests
    - future
    - python-crfsuite
    - probableparsing
    - metaphone

test:
  imports:
    - usaddress

about:
  home: https://github.com/datamade/usaddress
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Parse US addresses using conditional random fields

extra:
  recipe-maintainers:
    - wyseguy7
