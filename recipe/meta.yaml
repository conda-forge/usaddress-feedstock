{% set version = "0.5.16" %}
{% set sha = "f7e614e2489c159cf85be1b6f86edbfaf329dbeedef4d002a025757afd1ec6c6" %}

package:
  name: usaddress
  version: {{ version }}

source:
  fn: usaddress-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/u/usaddress/usaddress-{{ version }}.tar.gz
  sha256: {{ sha }}

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - future
    - python-crfsuite
    - probableparsing
    - metaphone

test:
  imports:
    - usaddress

about:
  home: https://github.com/datamade/usaddress
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Parse US addresses using conditional random fields

extra:
  recipe-maintainers:
    - wyseguy7
    - zaneselvans
